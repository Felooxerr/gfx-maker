<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>GFX Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;gap:20px}
h2{color:#fff;font-size:1.1rem;opacity:.6}
canvas{border-radius:16px;box-shadow:0 0 80px rgba(124,92,252,.4)}
.btns{display:flex;gap:12px}
button{background:linear-gradient(135deg,#7c5cfc,#fc5cf5);border:none;border-radius:10px;padding:12px 28px;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer}
label{background:#1c1c27;border:1px solid #2a2a3a;border-radius:10px;padding:12px 28px;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer}
input[type=file]{display:none}
</style>
</head>
<body>
<h2>🎮 AvatarGFX — Upload your avatar PNG below</h2>
<canvas id="c" width="800" height="600"></canvas>
<div class="btns">
  <label>📁 Upload Avatar<input type="file" accept="image/*" onchange="loadImg(this)"/></label>
  <button onclick="download()">⬇️ Download PNG</button>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=800,H=600;

// Draw immediately with placeholder
drawScene(null);

function loadImg(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>drawScene(img);
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawScene(avatarImg){
  ctx.clearRect(0,0,W,H);

  // ── BACKGROUND ──────────────────────────────
  // Deep dark gradient
  const bgGrad=ctx.createRadialGradient(W*.5,H*.4,0,W*.5,H*.5,W*.85);
  bgGrad.addColorStop(0,'#1a1535');
  bgGrad.addColorStop(.5,'#0d0d1a');
  bgGrad.addColorStop(1,'#050508');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,W,H);

  // Ground glow
  const groundGlow=ctx.createRadialGradient(W*.5,H*.78,0,W*.5,H*.78,W*.45);
  groundGlow.addColorStop(0,'rgba(100,60,255,0.35)');
  groundGlow.addColorStop(.5,'rgba(60,20,180,0.15)');
  groundGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=groundGlow;
  ctx.fillRect(0,0,W,H);

  // Ground floor reflection
  const floorGrad=ctx.createLinearGradient(0,H*.72,0,H);
  floorGrad.addColorStop(0,'rgba(80,40,200,0.18)');
  floorGrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=floorGrad;
  ctx.fillRect(0,H*.72,W,H*.28);

  // Stars
  ctx.save();
  for(let i=0;i<120;i++){
    const x=pseudoRand(i*13.7)*W;
    const y=pseudoRand(i*7.3)*H*.7;
    const r=pseudoRand(i*3.1)*1.4+.3;
    const a=pseudoRand(i*5.9)*.8+.2;
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.fill();
  }
  ctx.restore();

  // Nebula blobs
  drawNebula(W*.2,H*.25,180,'rgba(120,60,255,0.07)');
  drawNebula(W*.8,H*.2,220,'rgba(60,100,255,0.06)');
  drawNebula(W*.5,H*.15,260,'rgba(200,60,255,0.04)');

  // Grid floor lines
  ctx.save();
  ctx.globalAlpha=0.18;
  ctx.strokeStyle='#7c5cfc';
  ctx.lineWidth=1;
  // Perspective grid
  const horizon=H*.72;
  for(let i=0;i<=12;i++){
    const t=i/12;
    const x=W*t;
    ctx.beginPath();
    ctx.moveTo(W*.5,horizon);
    ctx.lineTo(x,H);
    ctx.stroke();
  }
  for(let i=0;i<=8;i++){
    const t=i/8;
    const y=horizon+t*(H-horizon);
    const spread=t*W*.5;
    ctx.beginPath();
    ctx.moveTo(W*.5-spread,y);
    ctx.lineTo(W*.5+spread,y);
    ctx.stroke();
  }
  ctx.restore();

  // ── AVATAR ─────────────────────────────────
  if(avatarImg){
    const aH=H*.78;
    const aW=aH*(avatarImg.width/avatarImg.height);
    const ax=W*.5-aW*.5;
    const ay=H*.5-aH*.62;

    ctx.save();
    ctx.translate(W*.5, H*.5);

    // HI POSE — arm up tilt
    ctx.rotate(-0.08);
    ctx.translate(-W*.5,-H*.5);

    // Shadow under avatar
    const shadowGrad=ctx.createRadialGradient(W*.5,H*.76,0,W*.5,H*.76,aW*.6);
    shadowGrad.addColorStop(0,'rgba(0,0,0,0.55)');
    shadowGrad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=shadowGrad;
    ctx.fillRect(ax-aW*.3,H*.65,aW*1.6,H*.2);

    // Outer glow / rim light (left side — blue)
    ctx.save();
    ctx.filter='blur(22px)';
    ctx.globalAlpha=0.55;
    ctx.drawImage(avatarImg,ax-18,ay,aW,aH);
    ctx.restore();

    // Outer glow / rim light (right side — purple)
    ctx.save();
    ctx.filter='blur(18px)';
    ctx.globalAlpha=0.4;
    // tint purple
    const offscreen=document.createElement('canvas');
    offscreen.width=aW;offscreen.height=aH;
    const oc=offscreen.getContext('2d');
    oc.drawImage(avatarImg,0,0,aW,aH);
    oc.globalCompositeOperation='source-atop';
    oc.fillStyle='rgba(124,92,252,0.6)';
    oc.fillRect(0,0,aW,aH);
    ctx.drawImage(offscreen,ax+18,ay,aW,aH);
    ctx.restore();

    // Main avatar
    ctx.drawImage(avatarImg,ax,ay,aW,aH);

    // Gloss overlay on avatar
    ctx.save();
    // clip to avatar bounds roughly
    ctx.beginPath();
    ctx.rect(ax,ay,aW,aH);
    ctx.clip();

    // Top-left specular highlight
    const spec=ctx.createRadialGradient(ax+aW*.28,ay+aH*.12,0,ax+aW*.28,ay+aH*.12,aW*.45);
    spec.addColorStop(0,'rgba(255,255,255,0.38)');
    spec.addColorStop(.3,'rgba(255,255,255,0.12)');
    spec.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=spec;
    ctx.fillRect(ax,ay,aW,aH*.6);

    // Fresnel rim right edge
    const rimR=ctx.createLinearGradient(ax+aW*.7,0,ax+aW,0);
    rimR.addColorStop(0,'rgba(124,92,252,0)');
    rimR.addColorStop(1,'rgba(124,92,252,0.45)');
    ctx.fillStyle=rimR;
    ctx.fillRect(ax+aW*.7,ay,aW*.3,aH);

    // Fresnel rim left edge
    const rimL=ctx.createLinearGradient(ax,0,ax+aW*.3,0);
    rimL.addColorStop(0,'rgba(60,120,255,0.35)');
    rimL.addColorStop(1,'rgba(60,120,255,0)');
    ctx.fillStyle=rimL;
    ctx.fillRect(ax,ay,aW*.3,aH);

    // Shimmer diagonal band
    ctx.save();
    ctx.globalAlpha=0.12;
    ctx.rotate(0.5);
    const shimmer=ctx.createLinearGradient(0,-200,200,200);
    shimmer.addColorStop(0,'rgba(255,255,255,0)');
    shimmer.addColorStop(.5,'rgba(255,255,255,0.9)');
    shimmer.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=shimmer;
    ctx.fillRect(ax-100,ay-100,aW*1.5,aH*1.5);
    ctx.restore();

    ctx.restore(); // end clip

    // Reflection on floor
    ctx.save();
    ctx.translate(W*.5,H*.74);
    ctx.scale(1,-0.18);
    ctx.globalAlpha=0.22;
    ctx.filter='blur(3px)';
    ctx.drawImage(avatarImg,-aW*.5,0,aW,aH);
    ctx.restore();

    ctx.restore(); // end pose transform

    // "HI" text effect — raised hand indicator
    ctx.save();
    ctx.font='bold 52px sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.shadowColor='#7c5cfc';
    ctx.shadowBlur=20;
    ctx.fillText('👋',W*.68,H*.22);
    ctx.restore();

  } else {
    // placeholder text
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.font='600 22px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('Upload your avatar PNG to generate GFX',W/2,H/2);
    ctx.textAlign='left';
  }

  // ── FOREGROUND FX ───────────────────────────

  // Lens flare top-left
  drawFlare(W*.22,H*.18);

  // Vignette
  const vig=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,W*.75);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.72)');
  ctx.fillStyle=vig;
  ctx.fillRect(0,0,W,H);

  // Chromatic aberration edges
  ctx.save();
  ctx.globalCompositeOperation='screen';
  ctx.globalAlpha=0.04;
  ctx.fillStyle='#ff0000';
  ctx.fillRect(0,0,8,H);
  ctx.fillRect(W-8,0,8,H);
  ctx.fillStyle='#0000ff';
  ctx.fillRect(2,0,8,H);
  ctx.fillRect(W-10,0,8,H);
  ctx.restore();

  // Film grain
  ctx.save();
  ctx.globalAlpha=0.032;
  for(let i=0;i<W*H/120;i++){
    const x=Math.random()*W,y=Math.random()*H;
    ctx.fillStyle=Math.random()>.5?'#fff':'#000';
    ctx.fillRect(x,y,1,1);
  }
  ctx.restore();

  // Watermark
  ctx.save();
  ctx.font='600 13px sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.textAlign='right';
  ctx.fillText('AvatarGFX · WebGL Edition',W-16,H-14);
  ctx.restore();
}

function drawNebula(x,y,r,color){
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,color);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;
  ctx.fillRect(x-r,y-r,r*2,r*2);
}

function drawFlare(x,y){
  ctx.save();
  ctx.globalCompositeOperation='screen';
  const g=ctx.createRadialGradient(x,y,0,x,y,90);
  g.addColorStop(0,'rgba(255,240,200,0.18)');
  g.addColorStop(.3,'rgba(200,160,255,0.08)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;
  ctx.fillRect(x-90,y-90,180,180);
  // streaks
  ctx.strokeStyle='rgba(255,255,255,0.07)';
  ctx.lineWidth=1;
  for(let a=0;a<Math.PI*2;a+=Math.PI/6){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+Math.cos(a)*120,y+Math.sin(a)*120);
    ctx.stroke();
  }
  ctx.restore();
}

function pseudoRand(seed){
  const s=Math.sin(seed)*43758.5453;
  return s-Math.floor(s);
}

function download(){
  const a=document.createElement('a');
  a.download='avatargfx.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
